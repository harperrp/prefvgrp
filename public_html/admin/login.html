<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login administrativo</title><link rel="stylesheet" href="../assets/css/app.css"></head><body class="login"><main class="login-card"><h1>RADGOV ADM</h1><p class="mut">Entre para administrar o portal.</p><form id="login" class="form"><div class="field"><label>E-mail</label><input class="input" name="email" type="email" required value="admin@radgov.com.br"></div><div class="field"><label>Senha</label><input class="input" name="password" type="password" required></div><button class="btn">Entrar</button></form><div id="msg"></div></main><script>
let csrf='';async function init(){const r=await fetch('/api/admin/csrf',{credentials:'same-origin'});const j=await r.json();csrf=j.csrf||'';if(j.user)location.href='../painel-adm.html'}
document.getElementById('login').onsubmit=async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target).entries());const r=await fetch('/api/admin/login',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json','X-CSRF-Token':csrf},body:JSON.stringify(data)});const j=await r.json();if(j.ok)location.href='../painel-adm.html';else document.getElementById('msg').innerHTML='<div class="error">'+(j.message||'Falha no login')+'</div>';};init();
</script></body></html>
